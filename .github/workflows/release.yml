on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:
  build-amd64:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build
        run: |
          make release
          tar -czvf ./toda-linux-amd64.tar.gz ./toda
      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v2
        with:
          name: toda-linux-amd64
          path: toda-linux-amd64.tar.gz

  build-arm64:
    name: Build (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build arm64 image and extract binary
        run: |
          docker buildx build --platform linux/arm64 -t chaos-mesh/toda:arm64 --load .
          docker run --rm --platform linux/arm64 -v ${PWD}:/opt/mount:z --entrypoint cp chaos-mesh/toda:arm64 /toda /opt/mount/toda
          tar -czvf ./toda-linux-arm64.tar.gz ./toda
      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v2
        with:
          name: toda-linux-arm64
          path: toda-linux-arm64.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v2
        with:
          name: toda-linux-amd64
      - name: Download arm64 artifact
        uses: actions/download-artifact@v2
        with:
          name: toda-linux-arm64
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload amd64 release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./toda-linux-amd64.tar.gz
          asset_name: toda-linux-amd64.tar.gz
          asset_content_type: application/gzip
      - name: Upload arm64 release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./toda-linux-arm64.tar.gz
          asset_name: toda-linux-arm64.tar.gz
          asset_content_type: application/gzip