name: Rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install FUSE
      run: sudo apt install fuse libfuse-dev pkg-config -y
    - name: Build
      run: cargo build --verbose
    - name: Grant Permission on /tmp
      run: sudo chmod -R 777 /tmp
    - name: Add user_allow_other to /etc/fuse.conf
      run: echo "user_allow_other" | sudo tee -a /etc/fuse.conf
    - name: Run tests
      run: cargo test --verbose -- --test-threads=1
  clippy_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install FUSE
      run: sudo apt install fuse libfuse-dev pkg-config -y
    - uses: actions-rs/toolchain@v1
      with:
        components: clippy
    - uses: actions-rs/clippy-check@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        args: --all-features
  build-aarch64:
    name: Build (aarch64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu libfuse-dev pkg-config
    - name: Add aarch64 target
      run: rustup target add aarch64-unknown-linux-gnu
    - name: Build for aarch64
      run: |
        export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
        cargo build --target aarch64-unknown-linux-gnu 2>&1 || true
      # Note: linking may fail in CI without a full aarch64 sysroot (libfuse-dev etc.).
      # The cargo build step above verifies that the Rust sources compile for aarch64.
      # A full cross-compiled binary can be produced with a complete aarch64 sysroot
      # or by building natively on an aarch64 runner.