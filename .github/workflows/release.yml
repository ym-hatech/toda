on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:
  build-amd64:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build
        run: |
          make release
          tar -czvf ./toda-linux-amd64.tar.gz ./toda
      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: toda-linux-amd64
          path: toda-linux-amd64.tar.gz

  build-arm64:
    name: Build (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build arm64 image and extract binary
        run: |
          docker buildx build --platform linux/arm64 -t chaos-mesh/toda:arm64 --load .
          docker run --rm --platform linux/arm64 -v ${PWD}:/opt/mount:z --entrypoint cp chaos-mesh/toda:arm64 /toda /opt/mount/toda
          tar -czvf ./toda-linux-arm64.tar.gz ./toda
      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: toda-linux-arm64
          path: toda-linux-arm64.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: toda-linux-amd64
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: toda-linux-arm64
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            toda-linux-amd64.tar.gz
            toda-linux-arm64.tar.gz
          draft: false
          prerelease: false